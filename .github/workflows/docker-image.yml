name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tz:
        description: "TZ build arg"
        required: false
        default: "Asia/Shanghai"
      claude_code_version:
        description: "CLAUDE_CODE_VERSION build arg"
        required: false
        default: "latest"
      git_delta_version:
        description: "GIT_DELTA_VERSION build arg"
        required: false
        default: "0.18.2"
      zsh_in_docker_version:
        description: "ZSH_IN_DOCKER_VERSION build arg"
        required: false
        default: "1.2.1"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  DEFAULT_TZ: Asia/Shanghai
  DEFAULT_CLAUDE_CODE_VERSION: latest
  DEFAULT_GIT_DELTA_VERSION: 0.18.2
  DEFAULT_ZSH_IN_DOCKER_VERSION: 1.2.1

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image name
        id: prep
        run: echo "image=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ steps.prep.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: |
            type=gha,scope=docker-${{ matrix.platform }}
          cache-to: |
            type=gha,mode=max,scope=docker-${{ matrix.platform }}
          build-args: |
            TZ=${{ inputs.tz || env.DEFAULT_TZ }}
            CLAUDE_CODE_VERSION=${{ inputs.claude_code_version || env.DEFAULT_CLAUDE_CODE_VERSION }}
            GIT_DELTA_VERSION=${{ inputs.git_delta_version || env.DEFAULT_GIT_DELTA_VERSION }}
            ZSH_IN_DOCKER_VERSION=${{ inputs.zsh_in_docker_version || env.DEFAULT_ZSH_IN_DOCKER_VERSION }}
          labels: |
            org.opencontainers.image.description=My multi-arch image

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: Merge multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image name
        id: prep
        run: echo "image=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.prep.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          tags_args=$(echo "${{ steps.meta.outputs.tags }}" | sed 's/^/-t /')
          digest_refs=$(printf '${{ env.REGISTRY }}/${{ steps.prep.outputs.image }}@sha256:%s ' *)
          docker buildx imagetools create $tags_args $digest_refs

      - name: Inspect image
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ steps.prep.outputs.image }}:${{ steps.meta.outputs.version }}
